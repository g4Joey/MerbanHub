name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE:      ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER:          ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD:      ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run Linter
        run: npm run lint
      - name: Run Tests
        env:
          DATABASE_URL: mysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@127.0.0.1:3306/${{ secrets.MYSQL_DATABASE }}
        run: npm test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run npm audit
        run: npm audit --audit-level=high

  docker-build:
    name: Build Docker Image & Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose
      - name: Generate .env file
        shell: bash
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE:      ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER:          ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD:      ${{ secrets.MYSQL_PASSWORD }}
          SCAN_FOLDER:         ${{ secrets.SCAN_FOLDER }}
          OUTPUT_FOLDER:       ${{ secrets.OUTPUT_FOLDER }}
          FULLY_INDEXED_FOLDER: ${{ secrets.FULLY_INDEXED_FOLDER }}
          PARTIALLY_INDEXED_FOLDER: ${{ secrets.PARTIALLY_INDEXED_FOLDER }}
          FAILED_FOLDER: ${{ secrets.FAILED_FOLDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_MS: ${{ secrets.JWT_EXPIRATION_MS }}
          OCR_BASE_PATH: ${{ secrets.OCR_BASE_PATH }}
        run: |
          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          SCAN_FOLDER=${SCAN_FOLDER}
          OUTPUT_FOLDER=${OUTPUT_FOLDER}
          FULLY_INDEXED_FOLDER=${FULLY_INDEXED_FOLDER}
          PARTIALLY_INDEXED_FOLDER=${PARTIALLY_INDEXED_FOLDER}
          FAILED_FOLDER=${FAILED_FOLDER}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS}
          OCR_BASE_PATH=${OCR_BASE_PATH}
          EOF
      - name: Build docker-compose services
        run: docker-compose -f docker-compose.yml build

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Docker Compose CLI
        run: sudo apt-get update && sudo apt-get install -y docker-compose
      - name: Generate .env file
        shell: bash
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE:      ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER:          ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD:      ${{ secrets.MYSQL_PASSWORD }}
          SCAN_FOLDER:         ${{ secrets.SCAN_FOLDER }}
          OUTPUT_FOLDER:       ${{ secrets.OUTPUT_FOLDER }}
          FULLY_INDEXED_FOLDER: ${{ secrets.FULLY_INDEXED_FOLDER }}
          PARTIALLY_INDEXED_FOLDER: ${{ secrets.PARTIALLY_INDEXED_FOLDER }}
          FAILED_FOLDER: ${{ secrets.FAILED_FOLDER }}
        run: |
          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          SCAN_FOLDER=${SCAN_FOLDER}
          OUTPUT_FOLDER=${OUTPUT_FOLDER}
          FULLY_INDEXED_FOLDER=${FULLY_INDEXED_FOLDER}
          PARTIALLY_INDEXED_FOLDER=${PARTIALLY_INDEXED_FOLDER}
          FAILED_FOLDER=${FAILED_FOLDER}
          EOF
      - name: Bring up services
        run: |
          docker-compose up -d
          for i in {1..30}; do \
            echo "Waiting for OCR API health... ($i/30)"; \
            if curl --fail http://localhost:8000/health; then \
              echo "OCR API is healthy!"; \
              break; \
            fi; \
            sleep 2; \
            if [ $i -eq 30 ]; then \
              echo "OCR API healthcheck failed after 60s."; \
              exit 1; \
            fi; \
          done
      - name: Check OCR API health
        run: curl --fail http://localhost:8000/health
      - name: Tear down Docker Compose
        if: always()
        run: docker-compose down
