name: CI

# Run on pushes and PRs to main or dev
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ocr
          POSTGRES_PASSWORD: ocrpass
          POSTGRES_DB: ocrdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ocr -d ocrdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Node.js
      - name: Use Node.js 16
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      # 3. Install your npm deps
      - name: Install dependencies
        run: npm ci

      # 4. Lint your code (assumes you have a "lint" script in package.json)
      - name: Lint
        run: npm run lint

      # 5. Run your tests (assumes you have a "test" script in package.json)
      - name: Test
        env:
          DATABASE_URL: postgresql://ocr:ocrpass@localhost:5432/ocrdb
        run: npm test

      # 6. Build your Docker image to catch Dockerfile errors early
      - name: Build Docker Image
        run: docker build -t merbanhub:ci .
