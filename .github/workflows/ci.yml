name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ocr
          POSTGRES_PASSWORD: ocrpass
          POSTGRES_DB: ocrdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $${{ services.postgres.env.POSTGRES_USER }} -d $${{ services.postgres.env.POSTGRES_DB }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          DATABASE_URL: postgresql://ocr:ocrpass@localhost:5432/ocrdb
        run: npm test

      - name: Build Docker image
        run: docker build -t merbanhub:ci .
