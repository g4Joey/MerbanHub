

name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  docker-build:
    name: Build Docker Image & Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Generate .env file
        shell: bash
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE:      ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER:          ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD:      ${{ secrets.MYSQL_PASSWORD }}
          SCAN_FOLDER:         ${{ secrets.SCAN_FOLDER }}
          OUTPUT_FOLDER:       ${{ secrets.OUTPUT_FOLDER }}
          FULLY_INDEXED_FOLDER: ${{ secrets.FULLY_INDEXED_FOLDER }}
          PARTIALLY_INDEXED_FOLDER: ${{ secrets.PARTIALLY_INDEXED_FOLDER }}
          FAILED_FOLDER: ${{ secrets.FAILED_FOLDER }}
        run: |
          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          SCAN_FOLDER=${SCAN_FOLDER}
          OUTPUT_FOLDER=${OUTPUT_FOLDER}
          FULLY_INDEXED_FOLDER=${FULLY_INDEXED_FOLDER}
          PARTIALLY_INDEXED_FOLDER=${PARTIALLY_INDEXED_FOLDER}
          FAILED_FOLDER=${FAILED_FOLDER}
          EOF

      - name: Build docker-compose services
        run: docker-compose -f docker-compose.yml build

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Docker Compose CLI
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Generate .env file
        shell: bash
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE:      ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER:          ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD:      ${{ secrets.MYSQL_PASSWORD }}
          SCAN_FOLDER:         ${{ secrets.SCAN_FOLDER }}
          OUTPUT_FOLDER:       ${{ secrets.OUTPUT_FOLDER }}
          FULLY_INDEXED_FOLDER: ${{ secrets.FULLY_INDEXED_FOLDER }}
          PARTIALLY_INDEXED_FOLDER: ${{ secrets.PARTIALLY_INDEXED_FOLDER }}
          FAILED_FOLDER: ${{ secrets.FAILED_FOLDER }}
        run: |
          cat > .env <<EOF
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          SCAN_FOLDER=${SCAN_FOLDER}
          OUTPUT_FOLDER=${OUTPUT_FOLDER}
          FULLY_INDEXED_FOLDER=${FULLY_INDEXED_FOLDER}
          PARTIALLY_INDEXED_FOLDER=${PARTIALLY_INDEXED_FOLDER}
          FAILED_FOLDER=${FAILED_FOLDER}
          EOF


      - name: Bring up services
        run: |
          docker-compose up -d
          for i in {1..30}; do \
            echo "Waiting for OCR API health... ($i/30)"; \
            if curl --fail http://localhost:8000/health; then \
              echo "OCR API is healthy!"; \
              break; \
            fi; \
            sleep 2; \
            if [ $i -eq 30 ]; then \
              echo "OCR API healthcheck failed after 60s."; \
              exit 1; \
            fi; \
          done

      - name: Check OCR API health
        run: curl --fail http://localhost:8000/health

      - name: Tear down Docker Compose
        if: always()
        run: docker-compose down
