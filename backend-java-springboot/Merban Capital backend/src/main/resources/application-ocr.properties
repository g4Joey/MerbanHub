# OCR Service Configuration
ocr.service.url=http://localhost:8000
ocr.base.path=D:/MerbanHub

# Enable OCR integration
ocr.enabled=true

# OCR processing options
ocr.auto-trigger=true
ocr.retry.max-attempts=3
ocr.retry.delay=1000

# File processing settings
file.upload.max-size=50MB
file.upload.allowed-types=pdf,png,jpg,jpeg
