services:
  ocr-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    # bind‐mount your scan, output and logs dirs into /app
    volumes:
      - "${SCAN_FOLDER}:/app/incoming-scan"
      - "${OUTPUT_FOLDER}:/app/output"
      - "./logs:/app/logs"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    # persist DB data
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: {}
