version: '3.8'

services:
  ocr-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: merbanhub-ocr
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - "${SCAN_FOLDER}:/app/scans"
      - "${OUTPUT_FOLDER}:/app/output"
      - "./logs:/app/logs"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:14
    container_name: merbanhub-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ocr", "-d", "ocrdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
