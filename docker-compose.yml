
services:
  ocr-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SCAN_FOLDER
      - OUTPUT_FOLDER
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MYSQL_USER
      - MYSQL_PASSWORD
      - MYSQL_HOST=db
    volumes:
      - "${SCAN_FOLDER}:/app/incoming-scan"
      - "${OUTPUT_FOLDER}:/app/output"
      - "${FULLY_INDEXED_FOLDER}:/app/fully_indexed"
      - "${PARTIALLY_INDEXED_FOLDER}:/app/partially_indexed"
      - "${FAILED_FOLDER}:/app/failed"
      - "./logs:/app/logs"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"

  db:
    image: mysql:8
    container_name: merbanhub-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

  # Java Spring Boot backend service
  merbanhub_db_data:

services:
  backend:
    build:
      context: ./backend-java-springboot/Merban Capital backend
      dockerfile: Dockerfile
    image: merbanhub-backend:latest
    container_name: merbanhub-backend
    ports:
      - "8081:8081"
    env_file:
      - ./backend-java-springboot/Merban Capital backend/.env
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      OCR_BASE_PATH: ${OCR_BASE_PATH}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
